version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      dev-dependencies:
        dependency-type: "development"
    labels:
      - "dependencies"

  # Keeps the CI workflow's own actions (checkout, setup-node, codeql-action,
  # docker/build-push-action, gitleaks-action) patched — Dependabot doesn't
  # cover its own pinned action versions otherwise.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "ci"
