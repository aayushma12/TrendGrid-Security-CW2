# Brings up the full stack: Postgres + the sibling backend (Backend/) +
# this frontend (Frontend/). Assumes the two project folders sit side by
# side on disk, exactly as they do in this checkout:
#
#   some-parent-dir/
#     Backend/
#     Frontend/       <- this file lives here
#
# Usage:
#   1. cp ../Backend/.env.example ../Backend/.env   (fill in real secrets)
#   2. cp .env.example .env.development
#   3. docker compose up --build
#
# The two apps have their own, unrelated Prisma schemas (the backend's
# e-commerce data model vs. this frontend's tenant/theme/page-builder
# model), so they get separate databases — postgres/init-multiple-dbs.sh
# creates the second one on first boot. Schema sync/migrations for both run
# automatically via the one-shot `api-migrate` / `web-migrate` services below.
#
# (Identical to ../Backend/docker-compose.yml, just runnable from
# this side too — keep both in sync if you change one.)

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: trendgrid_api
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../Backend/docker/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: syncs the backend's Prisma schema (no migrations folder in
  # that project — it uses `db push`, safe to run on every startup).
  api-migrate:
    build:
      context: ../Backend
      target: build
    command: npx prisma db push --skip-generate
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/trendgrid_api
    env_file:
      - ../Backend/.env
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: ../Backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/trendgrid_api
      CORS_ORIGIN: http://localhost:3000
      FRONTEND_URL: http://localhost:3000
    env_file:
      - ../Backend/.env
    depends_on:
      api-migrate:
        condition: service_completed_successfully

  # One-shot: applies this frontend's own Prisma migrations.
  web-migrate:
    build:
      context: .
      target: build
    command: npx prisma migrate deploy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/trendgriddb_frontend
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      args:
        NEXT_PUBLIC_API_URL: http://localhost:5000/api/v1
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/trendgriddb_frontend
      NODE_ENV: production
    depends_on:
      web-migrate:
        condition: service_completed_successfully
      api:
        condition: service_started

volumes:
  pgdata:
