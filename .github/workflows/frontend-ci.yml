name: Frontend CI

on:
  push:
    branches: ["**"]
    paths:
      - "Frontend/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    branches: ["**"]
    paths:
      - "Frontend/**"
      - ".github/workflows/frontend-ci.yml"

defaults:
  run:
    working-directory: Frontend

jobs:
  build-and-verify:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: trendgriddb_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/trendgriddb_ci
      NEXT_PUBLIC_API_URL: http://localhost:5000/api/v1

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Diagnose lint environment
        run: |
          echo "::notice::node=$(node --version) npm=$(npm --version) pwd=$(pwd) shell=$SHELL"
          echo "::notice::PATH=$PATH"
          if [ -e node_modules/.bin/eslint ]; then
            echo "::notice::eslint bin exists: $(ls -la node_modules/.bin/eslint) type=$(file node_modules/.bin/eslint 2>&1 || echo 'no file cmd')"
            echo "::notice::eslint bin first line: $(head -c 200 node_modules/.bin/eslint | tr '\n' '|')"
          else
            echo "::error::node_modules/.bin/eslint DOES NOT EXIST"
          fi
          echo "::notice::npx eslint --version output follows"
          npx eslint --version 2>&1 | sed 's/^/::notice::/'
          echo "::notice::direct node_modules/.bin/eslint --version:"
          node_modules/.bin/eslint --version 2>&1 | sed 's/^/::notice::/' || echo "::error::direct invocation failed with exit $?"

      - name: Lint
        run: |
          set +e
          OUTPUT=$(npm run lint 2>&1)
          CODE=$?
          if [ $CODE -ne 0 ]; then
            ESCAPED=$(printf '%s' "$OUTPUT" | sed ':a;N;$!ba;s/\n/%0A/g' | sed 's/%/%25/g; s/\r/%0D/g' | cut -c1-3000)
            echo "::error::LINT FAILED exit=$CODE :: $ESCAPED"
            exit $CODE
          fi
          echo "$OUTPUT"

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Apply database migrations
        run: npm run db:migrate

      - name: Seed database
        run: npm run db:seed

      - name: Verify seeded data (multi-tenant isolation, theme tokens, page sections)
        run: npm run db:verify

      - name: Build
        run: npm run build

      - name: Dependency audit — critical (blocking)
        run: npm audit --audit-level=critical

      - name: Dependency audit — high (informational)
        run: npm audit --audit-level=high
        continue-on-error: true

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build production image
        uses: docker/build-push-action@v6
        with:
          context: ./Frontend
          push: false
          tags: ndh-trendgrid-web:ci

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for committed secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
