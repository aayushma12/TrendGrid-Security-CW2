name: Frontend CI

on:
  push:
    branches: ["**"]
    paths:
      - "Frontend/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    branches: ["**"]
    paths:
      - "Frontend/**"
      - ".github/workflows/frontend-ci.yml"

defaults:
  run:
    working-directory: Frontend

jobs:
  build-and-verify:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: trendgriddb_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/trendgriddb_ci
      NEXT_PUBLIC_API_URL: http://localhost:5000/api/v1

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        # --include=dev is required here: the job env below sets
        # NODE_ENV=production (so later steps like Build behave like a real
        # production build), but npm ci reads that same env var and quietly
        # skips devDependencies entirely when it's set — no error, no
        # warning, it just installs the ~212 production packages instead of
        # the full set. eslint, typescript, tsx, etc. are all devDependencies,
        # so the Lint step then failed with "eslint: not found" (exit 127)
        # even though `npm ci` itself reported success on every run.
        # Confirmed by reproducing locally: `NODE_ENV=production npm ci`
        # installs node_modules with no eslint at all; adding --include=dev
        # restores it.
        run: npm ci --include=dev

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Apply database migrations
        run: npm run db:migrate

      - name: Seed database
        run: npm run db:seed

      - name: Verify seeded data (multi-tenant isolation, theme tokens, page sections)
        run: npm run db:verify

      - name: Build
        run: npm run build

      - name: Dependency audit — critical (blocking)
        run: npm audit --audit-level=critical

      - name: Dependency audit — high (informational)
        run: npm audit --audit-level=high
        continue-on-error: true

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build production image
        uses: docker/build-push-action@v6
        with:
          context: ./Frontend
          push: false
          tags: ndh-trendgrid-web:ci

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for committed secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
