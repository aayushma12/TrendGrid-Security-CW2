name: Backend CI

on:
  push:
    branches: ["**"]
    paths:
      - "Backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: ["**"]
    paths:
      - "Backend/**"
      - ".github/workflows/backend-ci.yml"

defaults:
  run:
    working-directory: Backend

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: trendgrid_api_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/trendgrid_api_ci
      JWT_SECRET: ci-test-secret-not-for-real-use-1234
      JWT_REFRESH_SECRET: ci-test-refresh-secret-not-for-real-use-5678
      ENCRYPTION_KEY: ci-test-encryption-key-32-chars-min
      CLOUDINARY_CLOUD_NAME: ci-test
      CLOUDINARY_API_KEY: ci-test
      CLOUDINARY_API_SECRET: ci-test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          # No npm cache — see frontend-ci.yml for why: a stale/incomplete
          # restored cache silently broke bin-linking for at least one
          # package there despite `npm ci` reporting success. Not worth the
          # same risk here for the modest speedup.

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Typecheck + build
        run: npm run build

      - name: Sync database schema
        run: npx prisma db push --skip-generate

      - name: Run tests
        run: npm test

      - name: Dependency audit — critical (blocking)
        run: npm audit --audit-level=critical

      - name: Dependency audit — high (informational)
        run: npm audit --audit-level=high
        continue-on-error: true

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build production image
        uses: docker/build-push-action@v6
        with:
          context: ./Backend
          push: false
          tags: ndh-trendgrid-api:ci

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for committed secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
