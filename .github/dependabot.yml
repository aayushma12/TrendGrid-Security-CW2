version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/Backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      dev-dependencies:
        dependency-type: "development"
    labels:
      - "dependencies"
      - "backend"

  - package-ecosystem: "npm"
    directory: "/Frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      dev-dependencies:
        dependency-type: "development"
    labels:
      - "dependencies"
      - "frontend"

  # Keeps the CI workflows' own actions (checkout, setup-node, codeql-action,
  # docker/build-push-action, gitleaks-action) patched — Dependabot doesn't
  # cover its own pinned action versions otherwise. Workflows now live at the
  # repo root (.github/workflows), not per-service, so this is a single entry.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "ci"
